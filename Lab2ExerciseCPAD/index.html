<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Style Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container"> 
        <header>
            <h1>Kanban Style Dashboard</h1>
            <label for=""
            <label for="priority-class">Priority: </label>
            <select name="priority-class" id="priority-class">
                <option value="not-important">Not Important</option>
                <option value="important">Important</option>
                <option value="urgent-important">Urgent & Important</option>
            </select>
        </header>
    </div>

    <div class="grid">
        <section id="todo">
            <h2>To Do</h2>
            <ul></ul>
            <button>Add Task</button>
        </section>

        <section id="inprogress">
            <h2>In Progress</h2>
            <button>Add Task</button>
            <ul></ul>
        </section>
        
        <section id="done">
            <h2>Done</h2>
            <ul></ul>
            <button>Add Task</button>
        </section>
    </div>

    <div class="modal">
        <div class="form-group">
            <label>Task Title</label>
            <input type="text" id="taskTitle" placeholder="e.g., CPAD Assignment">
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea id="taskDesc" placeholder="Write some description.."></textarea>
        </div>

        <label for="priority">Choose a priority: </label>
        <select name="priority" id="priority">
            <option value="not-important">Not Important</option>
            <option value="important">Important</option>
            <option value="urgent-important">Urgent & Important</option>
        </select>

        <label for="date">Pick a date: </label>
        <input type="date" id="date" name="date">

        <button id="saveBtn">Save</button>
        <button id="cancelBtn">Cancel</button>
    </div>

    <script src="taskmanager.js"></script>
</body>
